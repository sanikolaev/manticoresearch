name: 📖 Trigger doc check
run-name: 📖 Trigger doc check ${{ github.sha }}

# We use this intermediate workflow to workaround the issue with repo secrets unavailable for PR-s from external repos
# The `check_docs` workflow use this one for its `workflow_run` event which let it run without errors
on:
  pull_request:
    paths:
      - 'manual/**'
    branches:
      - master
      - manticore-*

jobs:
  trigger_doc_check:
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash
    steps:
      - name: Save PR repo and translate mode
        env:
          PR_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          PR_REF: ${{ github.event.pull_request.head.ref }}
          PR_IS_DRAFT: ${{ github.event.pull_request.draft }}
          PR_HAS_DRAFT_LABEL: ${{ contains(github.event.pull_request.labels.*.name, 'draft') }}
        run: |
          echo $PR_REPO > pr_repo.txt
          echo $PR_REF >> pr_repo.txt
          skip_translate=false
          reason=ready
          if [[ "$PR_IS_DRAFT" == "true" ]]; then
            skip_translate=true
            reason=draft_pr
          elif [[ "$PR_HAS_DRAFT_LABEL" == "true" ]]; then
            skip_translate=true
            reason=draft_label
          fi
          echo "$skip_translate" > skip_translate.txt
          echo "$reason" > skip_translate_reason.txt

      - name: Show translate mode
        run: |
          skip_translate=$(tr -d '\r\n' < skip_translate.txt)
          reason=$(tr -d '\r\n' < skip_translate_reason.txt)
          if [[ "$skip_translate" == "true" ]]; then
            echo "Auto-translate: SKIPPED ($reason)"
            echo "### Auto-translate: skipped" >> $GITHUB_STEP_SUMMARY
            echo "- Reason: $reason" >> $GITHUB_STEP_SUMMARY
          else
            echo "Auto-translate: ENABLED"
            echo "### Auto-translate: enabled" >> $GITHUB_STEP_SUMMARY
            echo "- Reason: $reason" >> $GITHUB_STEP_SUMMARY
          fi
          echo "- PR repo: $PR_REPO" >> $GITHUB_STEP_SUMMARY
          echo "- PR ref: $PR_REF" >> $GITHUB_STEP_SUMMARY
      - name: Upload PR repo name
        uses: actions/upload-artifact@v4
        with:
          name: pr_repo
          path: ./pr_repo.txt
      - name: Upload translate mode
        uses: actions/upload-artifact@v4
        with:
          name: skip_translate
          path: |
            ./skip_translate.txt
            ./skip_translate_reason.txt
      - name: Trigger doc check
        run: |
          echo "Doc check triggered"
